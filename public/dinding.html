<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌 Dinding Cinta — Ruang Pacaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Quicksand,system-ui,sans-serif;background:linear-gradient(135deg,#fff0f5,#f3e8ff,#fff0f5);min-height:100dvh;color:#1e1b2e}

    /* Header */
    .dw-header{
      position:sticky;top:0;z-index:50;
      display:flex;align-items:center;gap:12px;padding:12px 16px;
      background:rgba(255,240,248,.9);backdrop-filter:blur(12px);
      border-bottom:1.5px solid rgba(236,72,153,.15);
    }
    .dw-back{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#be185d;text-decoration:none;background:rgba(255,255,255,.8);transition:background .15s}
    .dw-back:hover{background:#fce7f3}
    .dw-header-info{flex:1}
    .dw-title{font-size:17px;font-weight:800;background:linear-gradient(135deg,#ec4899,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .dw-sub{font-size:11px;color:#9d4b78;margin-top:1px}
    .dw-count{font-size:12px;font-weight:700;color:#be185d;background:rgba(236,72,153,.1);border:1px solid #fbcfe8;border-radius:999px;padding:3px 10px;white-space:nowrap}

    /* Form post */
    .dw-form-wrap{padding:16px;max-width:680px;margin:0 auto}
    .dw-form{background:rgba(255,255,255,.9);border:2px solid #fbcfe8;border-radius:20px;padding:16px;box-shadow:0 4px 20px rgba(236,72,153,.1)}
    .dw-form-title{font-size:14px;font-weight:800;color:#be185d;margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .dw-row{display:flex;gap:10px;margin-bottom:10px}
    .dw-input{flex:1;padding:10px 14px;border:2px solid #fbcfe8;border-radius:12px;font-size:14px;font-family:inherit;color:#1e1b2e;background:#fff8fb;outline:none;transition:border-color .15s}
    .dw-input:focus{border-color:#ec4899}
    .dw-input::placeholder{color:#d8a0bf}
    .dw-textarea{width:100%;padding:10px 14px;border:2px solid #fbcfe8;border-radius:12px;font-size:14px;font-family:inherit;color:#1e1b2e;background:#fff8fb;outline:none;resize:none;height:80px;transition:border-color .15s;margin-bottom:10px;display:block}
    .dw-textarea:focus{border-color:#ec4899}
    .dw-form-footer{display:flex;align-items:center;gap:10px;justify-content:space-between}
    .dw-char{font-size:11px;color:#c084a8;flex:1;text-align:right}
    .dw-submit{padding:10px 22px;border:none;border-radius:12px;background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(236,72,153,.3);transition:filter .15s,transform .15s}
    .dw-submit:hover{filter:brightness(1.08);transform:scale(1.03)}
    .dw-submit:active{transform:scale(.96)}


    /* Feed */
    .dw-feed{max-width:680px;margin:0 auto;padding:0 16px 24px;display:flex;flex-direction:column;gap:14px}
    .dw-divider-label{text-align:center;font-size:12px;color:#c084a8;font-weight:600;padding:4px 0}

    /* Post card */
    .dw-post{background:rgba(255,255,255,.92);border:1.5px solid #fbcfe8;border-radius:20px;padding:16px;box-shadow:0 2px 12px rgba(236,72,153,.08);animation:postIn .3s ease}
    @keyframes postIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .dw-post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .dw-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
    .dw-post-meta{flex:1;min-width:0}
    .dw-post-name{font-size:14px;font-weight:800;color:#be185d}
    .dw-post-to{font-size:11px;color:#a855f7;font-weight:600}
    .dw-post-time{font-size:10px;color:#c084a8;margin-top:2px}
    .dw-post-msg{font-size:14px;color:#1e1b2e;line-height:1.6;margin-bottom:10px;white-space:pre-wrap;word-break:break-word}

    .dw-post-footer{display:flex;align-items:center;gap:8px}
    .dw-like-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px solid #fbcfe8;border-radius:999px;background:#fff8fb;color:#be185d;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
    .dw-like-btn:hover{background:#fce7f3;border-color:#ec4899}
    .dw-like-btn.liked{background:linear-gradient(135deg,#fce7f3,#ede9fe);border-color:#ec4899;color:#be185d}
    .dw-like-btn.liked .dw-heart{animation:heartPop .3s cubic-bezier(.18,1.25,.4,1)}
    @keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
    .dw-empty{text-align:center;padding:40px 20px;color:#c084a8;font-size:14px}
    .dw-empty-icon{font-size:48px;margin-bottom:12px}
    .dw-loading{text-align:center;padding:20px;color:#c084a8;font-size:13px}


    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1b2e;color:#fff;border-radius:999px;padding:8px 20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;z-index:998;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:600px){
      .dw-row{flex-direction:column}
      .dw-form-footer{flex-wrap:wrap}
    }
  </style>
</head>
<body>
  <header class="dw-header">
    <a href="/" class="dw-back">←</a>
    <div class="dw-header-info">
      <div class="dw-title">💌 Dinding Cinta</div>
      <div class="dw-sub">Papan pesan publik untuk pasangan LDR 💕</div>
    </div>
    <div class="dw-count" id="dwCount">0 pesan</div>
  </header>

  <!-- Form Post -->
  <div class="dw-form-wrap">
    <div class="dw-form">
      <div class="dw-form-title">✍️ Tulis pesan untuk pasanganmu</div>
      <div class="dw-row">
        <input class="dw-input" id="dwName" placeholder="Namamu..." maxlength="30"/>
        <input class="dw-input" id="dwTo" placeholder="Untuk siapa? (opsional)" maxlength="30"/>
      </div>
      <textarea class="dw-textarea" id="dwMsg" placeholder="Tulis pesanmu di sini... 💕" maxlength="300"></textarea>
      <div class="dw-form-footer">
        <span class="dw-char" id="dwChar">300</span>
        <button class="dw-submit" id="dwSubmit">Kirim 💌</button>
      </div>
    </div>
  </div>

  <!-- Feed -->
  <div class="dw-feed" id="dwFeed">
    <div class="dw-loading">Memuat pesan... 💕</div>
  </div>


  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  const socket = io();
  const g = id => document.getElementById(id);

  // Toast
  let _tt;
  function toast(msg) {
    const t = g("toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove("show"), 2500);
  }

  // Avatar colors
  const AV_COLORS = [["#ec4899","#a855f7"],["#f97316","#ef4444"],["#14b8a6","#3b82f6"],["#8b5cf6","#ec4899"],["#10b981","#06b6d4"],["#f43f5e","#f97316"]];
  function avColor(name) { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))&0xffff; return AV_COLORS[h%AV_COLORS.length]; }
  function avInit(name) { return (name||"?")[0].toUpperCase(); }

  // Time format
  function timeAgo(ts) {
    const d = Date.now()-ts;
    if(d<60000) return "baru saja";
    if(d<3600000) return Math.floor(d/60000)+" menit lalu";
    if(d<86400000) return Math.floor(d/3600000)+" jam lalu";
    return Math.floor(d/86400000)+" hari lalu";
  }

  // Liked posts (localStorage)
  const likedSet = new Set(JSON.parse(localStorage.getItem("dw_liked")||"[]"));
  function saveLiked() { localStorage.setItem("dw_liked", JSON.stringify([...likedSet])); }

  // Render post
  function renderPost(p, prepend=false) {
    const feed = g("dwFeed");
    const loading = feed.querySelector(".dw-loading");
    if(loading) loading.remove();

    const [c1,c2] = avColor(p.name);
    const liked = likedSet.has(p.id);
    const div = document.createElement("div");
    div.className = "dw-post"; div.dataset.id = p.id;
    div.innerHTML = `
      <div class="dw-post-header">
        <div class="dw-avatar" style="background:linear-gradient(135deg,${c1},${c2})">${avInit(p.name)}</div>
        <div class="dw-post-meta">
          <div class="dw-post-name">${esc(p.name)}${p.to?` <span style="font-weight:500;color:#9d4b78">→</span> <span style="color:#a855f7">${esc(p.to)}</span>`:""}</div>
          ${p.to?`<div class="dw-post-to">💌 Untuk ${esc(p.to)}</div>`:""}
          <div class="dw-post-time">${timeAgo(p.ts)}</div>
        </div>
      </div>
      <div class="dw-post-msg">${esc(p.message)}</div>
      <div class="dw-post-footer">
        <button class="dw-like-btn${liked?" liked":""}" data-id="${p.id}">
          <span class="dw-heart">${liked?"❤️":"🤍"}</span>
          <span class="dw-like-num">${p.likes||0}</span>
        </button>
      </div>
    `;
    if(prepend) feed.prepend(div); else feed.appendChild(div);
  }

  function esc(s){ return String(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Load posts
  async function loadPosts() {
    try {
      const res = await fetch("/api/dinding");
      const posts = await res.json();
      const feed = g("dwFeed");
      feed.innerHTML = "";
      if(!posts.length) {
        feed.innerHTML = `<div class="dw-empty"><div class="dw-empty-icon">💌</div>Belum ada pesan.<br>Jadilah yang pertama menulis!</div>`;
      } else {
        posts.forEach(p => renderPost(p));
      }
      g("dwCount").textContent = posts.length + " pesan";
    } catch(e) { g("dwFeed").innerHTML = '<div class="dw-empty">Gagal memuat 😢</div>'; }
  }
  loadPosts();

  // Like
  g("dwFeed").addEventListener("click", async e => {
    const btn = e.target.closest(".dw-like-btn");
    if(!btn) return;
    const id = btn.dataset.id;
    if(likedSet.has(id)) { toast("Sudah disukai 💕"); return; }
    try {
      const res = await fetch(`/api/dinding/${id}/like`, { method:"POST" });
      const data = await res.json();
      likedSet.add(id); saveLiked();
      btn.classList.add("liked");
      btn.querySelector(".dw-heart").textContent = "❤️";
      btn.querySelector(".dw-like-num").textContent = data.likes;
    } catch(e) { toast("Gagal menyukai"); }
  });

  // Submit post
  g("dwMsg").addEventListener("input", () => {
    g("dwChar").textContent = 300 - g("dwMsg").value.length;
  });

  g("dwSubmit").addEventListener("click", async () => {
    const name = g("dwName").value.trim();
    const to   = g("dwTo").value.trim();
    const msg  = g("dwMsg").value.trim();
    if(!name) { toast("Isi namamu dulu!"); g("dwName").focus(); return; }
    if(!msg)  { toast("Tulis pesannya dulu!"); g("dwMsg").focus(); return; }

    if(name) localStorage.setItem("pacaran_name", name);

    g("dwSubmit").disabled = true; g("dwSubmit").textContent = "Mengirim...";
    try {
      await fetch("/api/dinding", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name, to, message: msg }),
      });
      g("dwMsg").value = ""; g("dwTo").value = "";
      g("dwChar").textContent = "300";
      toast("Pesan terkirim! 💌");
    } catch(e) { toast("Gagal mengirim 😢"); }
    g("dwSubmit").disabled = false; g("dwSubmit").textContent = "Kirim 💌";
  });

  // Prefill nama
  const saved = localStorage.getItem("pacaran_name");
  if(saved) g("dwName").value = saved;

  // Real-time
  socket.on("dinding-new", p => {
    renderPost(p, true);
    const c = g("dwCount");
    c.textContent = (parseInt(c.textContent)||0)+1+" pesan";
  });
  socket.on("dinding-like", ({ id, likes }) => {
    const btn = document.querySelector(`.dw-like-btn[data-id="${id}"]`);
    if(btn) btn.querySelector(".dw-like-num").textContent = likes;
  });

  </script>
</body>
</html>
